<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetDevAutomate Artefacts</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --purple: #bc8cff;
            --orange: #d29922;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 2rem 0;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-dim);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .repo-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }

        .repo-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .repo-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card-preview {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #1a1e2e 0%, #2d1b3d 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-preview .fallback-icon {
            font-size: 3rem;
            opacity: 0.4;
        }

        .card-body {
            padding: 1.25rem;
        }

        .card-body h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--accent);
        }

        .card-body .description {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .artefact-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .badge.audio { color: var(--green); background: rgba(63, 185, 80, 0.1); border-color: rgba(63, 185, 80, 0.2); }
        .badge.video { color: var(--purple); background: rgba(188, 140, 255, 0.1); border-color: rgba(188, 140, 255, 0.2); }
        .badge.slides { color: var(--orange); background: rgba(210, 153, 34, 0.1); border-color: rgba(210, 153, 34, 0.2); }

        .updated {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.75rem;
        }

        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--text-dim);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .repo-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>NetDevAutomate Artefacts</h1>
            <p>AI-generated audio overviews, video walkthroughs, infographics, and slide decks for open-source projects — powered by Google NotebookLM.</p>
        </div>
    </header>

    <div class="container">
        <div id="repo-grid" class="repo-grid">
            <div class="loading">Loading artefacts...</div>
        </div>
    </div>

    <footer>
        <p>Generated by <a href="https://github.com/NetDevAutomate/notebooklm-repo-artefacts">notebooklm-repo-artefacts</a></p>
    </footer>

    <script>
        const BADGE_LABELS = {
            audio: '\u{1F3A7} Audio',
            video: '\u{1F3AC} Video',
            infographic: '\u{1F5BC} Infographic',
            slides: '\u{1F4CA} Slides'
        };

        async function loadManifest() {
            try {
                const res = await fetch('manifest.json');
                if (!res.ok) throw new Error('No manifest');
                return await res.json();
            } catch {
                return { repos: [] };
            }
        }

        function renderCard(repo) {
            const card = document.createElement('div');
            card.className = 'repo-card';

            const badges = (repo.artefacts || [])
                .map(a => `<span class="badge ${a}">${BADGE_LABELS[a] || a}</span>`)
                .join('');

            const previewSrc = repo.artefacts?.includes('infographic')
                ? `${repo.name}/artefacts/infographic.png`
                : null;

            const previewHtml = previewSrc
                ? `<img src="${previewSrc}" alt="${repo.title}" onerror="this.parentElement.innerHTML='<span class=fallback-icon>\u{1F4E6}</span>'">`
                : '<span class="fallback-icon">\u{1F4E6}</span>';

            card.innerHTML = `
                <a href="${repo.name}/artefacts/">
                    <div class="card-preview">${previewHtml}</div>
                    <div class="card-body">
                        <h2>${repo.title || repo.name}</h2>
                        <div class="description">${repo.description || ''}</div>
                        <div class="artefact-badges">${badges}</div>
                        ${repo.updated ? `<div class="updated">Updated ${repo.updated}</div>` : ''}
                    </div>
                </a>
            `;
            return card;
        }

        async function init() {
            const grid = document.getElementById('repo-grid');
            const manifest = await loadManifest();

            if (!manifest.repos.length) {
                grid.innerHTML = '<div class="empty-state"><p>No artefacts published yet.</p></div>';
                return;
            }

            grid.innerHTML = '';
            manifest.repos
                .sort((a, b) => (b.updated || '').localeCompare(a.updated || ''))
                .forEach(repo => grid.appendChild(renderCard(repo)));
        }

        init();
    </script>
</body>
</html>
